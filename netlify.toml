[build]
  command = "npm ci"
  functions = "netlify/functions"
  publish = "public"

[dev]
  command = "npm start"
  port = 3000

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "max-age=0, no-cache, no-store, must-revalidate"
